<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gabin Search</title>

<link href="https://fonts.googleapis.com/css?family=Product+Sans" rel="stylesheet">

<style>
body{
    font-family:'Product Sans', Arial, sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
    margin:0;
    background:#fff;
    color:#333;
}

.gabin-logo{
    font-size:5rem;
    font-weight:bold;
    margin-bottom:30px;
    letter-spacing:-2px;
}

.gabin-logo span:nth-child(1){color:#4285f4;}
.gabin-logo span:nth-child(2){color:#ea4335;}
.gabin-logo span:nth-child(3){color:#fbbc05;}
.gabin-logo span:nth-child(4){color:#4285f4;}
.gabin-logo span:nth-child(5){color:#34a853;}

.search-container{
    width:100%;
    max-width:700px;
    padding:0 20px;
}

.footer{
    position:absolute;
    bottom:20px;
    font-size:0.85rem;
    color:#70757a;
}
</style>

<!-- IMPORTANT -->
<script async src="https://cse.google.com/cse.js?cx=b402d636637744206"></script>

</head>
<body>

<div class="gabin-logo">
<span>G</span><span>a</span><span>b</span><span>i</span><span>n</span>
</div>

<div class="search-container">
    <!-- Ini yang bikin tampilan normal + tab otomatis -->
    <div class="gcse-search"></div>
</div>

<div class="footer">
&copy; 2026 Gabin Search Engine
</div>

</body>
</html>
