<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gabin Search</title>

<link href="https://fonts.googleapis.com/css?family=Product+Sans" rel="stylesheet">

<style>
body {
    font-family: 'Product Sans', Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    background-color: #FFFFFF;
    color: #333;
}

.gabin-logo {
    font-size: 5rem;
    font-weight: bold;
    margin-top: 100px;
    margin-bottom: 20px;
    letter-spacing: -2px;
}

.gabin-logo span:nth-child(1){color:#4285f4;}
.gabin-logo span:nth-child(2){color:#ea4335;}
.gabin-logo span:nth-child(3){color:#fbbc05;}
.gabin-logo span:nth-child(4){color:#4285f4;}
.gabin-logo span:nth-child(5){color:#34a853;}

.search-container {
    width: 100%;
    max-width: 700px;
    padding: 0 20px;
}

/* Tabs */
.tabs {
    display: flex;
    gap: 20px;
    margin-top: 20px;
    border-bottom: 1px solid #ddd;
    padding-bottom: 8px;
}

.tab {
    cursor: pointer;
    font-size: 1rem;
    padding-bottom: 5px;
    color: #5f6368;
}

.tab.active {
    color: #1a73e8;
    border-bottom: 2px solid #1a73e8;
}

/* CSE Styling */
.gsc-control-cse {
    background-color: transparent !important;
    border: none !important;
    padding: 0 !important;
}

.footer {
    margin-top: auto;
    padding: 20px;
    font-size: 0.85rem;
    color: #70757a;
}
</style>

<script async src="https://cse.google.com/cse.js?cx=b402d636637744206"></script>
</head>

<body>

<div class="gabin-logo">
<span>G</span><span>a</span><span>b</span><span>i</span><span>n</span>
</div>

<div class="search-container">

    <!-- Search Bar -->
    <div class="gcse-searchbox-only"></div>

    <!-- Tabs -->
    <div class="tabs">
        <div class="tab active" onclick="switchTab('web', this)">Web</div>
        <div class="tab" onclick="switchTab('image', this)">Image</div>
    </div>

    <!-- Results -->
    <div id="web-results">
        <div class="gcse-searchresults-only"></div>
    </div>

    <div id="image-results" style="display:none;">
        <div class="gcse-searchresults-only" data-searchtype="image"></div>
    </div>

</div>

<div class="footer">
&copy; 2026 Gabin Search Engine
</div>

<script>
function switchTab(type, element){
    document.getElementById("web-results").style.display = 
        type === "web" ? "block" : "none";
    document.getElementById("image-results").style.display = 
        type === "image" ? "block" : "none";

    document.querySelectorAll(".tab").forEach(tab=>{
        tab.classList.remove("active");
    });

    element.classList.add("active");
}
</script>

</body>
</html>
