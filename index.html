<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabin Search</title>
    <link href="https://fonts.googleapis.com/css?family=Product+Sans" rel="stylesheet">
    <style>
        body {
            font-family: 'Product Sans', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #FFFFFF;
            color: #333333;
        }
        .gabin-logo {
            font-size: 5rem;
            font-weight: bold;
            margin-bottom: 30px;
            letter-spacing: -2px;
        }
        /* Memberikan warna berbeda pada tiap huruf Gabin layaknya mesin pencari populer */
        .gabin-logo span:nth-child(1) { color: #4285f4; } /* G */
        .gabin-logo span:nth-child(2) { color: #ea4335; } /* a */
        .gabin-logo span:nth-child(3) { color: #fbbc05; } /* b */
        .gabin-logo span:nth-child(4) { color: #4285f4; } /* i */
        .gabin-logo span:nth-child(5) { color: #34a853; } /* n */
        
        .search-container {
            width: 100%;
            max-width: 700px;
            padding: 0 20px;
            box-sizing: border-box;
        }
        
        /* Modifikasi tampilan bawaan Google CSE agar menyatu dengan tema Gabin */
        .gsc-control-cse {
            background-color: transparent !important;
            border: none !important;
            padding: 0 !important;
        }
        .gsc-search-button-v2 {
            border-radius: 4px;
        }
        
        .footer {
            position: absolute;
            bottom: 20px;
            font-size: 0.85rem;
            color: #70757a;
        }
    </style>
    
    <script async src="https://cse.google.com/cse.js?cx=b402d636637744206"></script>
</head>
<body>

    <div class="gabin-logo">
        <span>G</span><span>a</span><span>b</span><span>i</span><span>n</span>
    </div>

    <div class="search-container">
        <div class="gcse-search"></div>
    </div>

    <div class="footer">
        &copy; 2026 Gabin Search Engine
    </div>

</body>
</html>
